version: '3.8'

services:
  ninjaagent:
    build: .
    ports:
      - "8000:8000"
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - INJECTIVE_MNEMONIC=${INJECTIVE_MNEMONIC}
      - INJECTIVE_NETWORK=${INJECTIVE_NETWORK:-testnet}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    env_file:
      - .env
    volumes:
      - .:/app
    command: python backend/main.py
      
  telegram-bot:
    build: .
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    env_file:
      - .env
      - backend/telegram/.env
    volumes:
      - .:/app
    command: python backend/telegram/main.py